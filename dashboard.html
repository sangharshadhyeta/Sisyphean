<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sisyphean Engine</title>
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { fontFamily: { mono: ['JetBrains Mono', 'Fira Code', 'monospace'] } } }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body { background: #0a0c14; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; margin: 0; }
    .dot-pulse { animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .card { background: #12152a; border: 1px solid #1e2235; border-radius: 12px; }
    .stat-val { font-size: 2rem; font-weight: 600; line-height: 1; }
    .tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:.7rem; font-weight:600; }
    /* Status dots */
    .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; display:inline-block; }
    .dot-pending  { background:#374151; }
    .dot-running  { background:#22c55e; animation:pulse 1.2s ease-in-out infinite; }
    .dot-done     { background:#6366f1; }
    .dot-failed   { background:#ef4444; }
    /* Scrollbars */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 4px; }
    /* Execution timeline */
    .tl-ph  { transition: background .12s; }
    .tl-ph:hover  { background: #141728 !important; }
    .tl-sr  { transition: background .12s; }
    .tl-sr:hover  { background: #0d0f1c !important; }
    /* Memory graph */
    .mg-node { cursor: pointer; }
    .mg-node circle { transition: r .15s; }
    .mg-node:hover circle { r: 7; }
    /* Activity row */
    .ev-row { border-bottom: 1px solid #1a1d2e; }
    .ev-row:last-child { border-bottom: none; }
  </style>
</head>
<body class="min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ── Helpers ────────────────────────────────────────────────────────────────────
function formatUptime(s) {
  if (s < 60) return `${s}s`;
  if (s < 3600) return `${Math.floor(s/60)}m ${s%60}s`;
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  return `${h}h ${m}m`;
}
function timeAgo(ts) {
  const d = Math.round(Date.now()/1000 - ts);
  if (d < 5) return 'just now';
  if (d < 60) return `${d}s ago`;
  if (d < 3600) return `${Math.floor(d/60)}m ago`;
  return `${Math.floor(d/3600)}h ago`;
}
function elapsedFmt(ms) {
  if (!ms) return '';
  return ms >= 1000 ? `${(ms/1000).toFixed(1)}s` : `${ms}ms`;
}

// ── Tool / type colours ────────────────────────────────────────────────────────
const TOOL_COLOR = {
  web_search:'#06b6d4', websearch:'#06b6d4', webfetch:'#0891b2',
  search_memory:'#0ea5e9', search_knowledge:'#0ea5e9', search_soul:'#8b5cf6',
  save_memory:'#ec4899', remember:'#ec4899',
  answer:'#a855f7', synthesize:'#34d399',
  bash:'#eab308', write:'#7c3aed', write_plan:'#6d28d9',
  read:'#10b981', glob:'#34d399', grep:'#6ee7b7', edit:'#f59e0b',
  plan:'#818cf8', planner:'#818cf8',
  default:'#475569',
};
function tc(t){ return TOOL_COLOR[(t||'').toLowerCase()] || TOOL_COLOR.default; }

const NODE_TYPE_COLOR = {
  soul:'#a78bfa', policy:'#a78bfa', user:'#34d399', project:'#f59e0b',
  fact:'#60a5fa', concept:'#38bdf8', entity:'#818cf8', skill:'#f472b6',
  system:'#94a3b8', session:'#64748b', preference:'#a3e635',
};
function ntc(t){ return NODE_TYPE_COLOR[t] || '#475569'; }

// ── Status badge ───────────────────────────────────────────────────────────────
function StatusBadge({ running, mock, llmReady }) {
  if (!running) return <span className="tag bg-red-900/60 text-red-300">Offline</span>;
  if (mock)     return <span className="tag bg-yellow-900/60 text-yellow-300">Mock mode</span>;
  if (!llmReady) return (
    <span className="tag bg-red-900/60 text-red-300 flex items-center gap-1">
      <span className="w-2 h-2 rounded-full bg-red-400 inline-block"></span>
      Model unavailable
    </span>
  );
  return (
    <span className="tag bg-emerald-900/60 text-emerald-300 flex items-center gap-1">
      <span className="w-2 h-2 rounded-full bg-emerald-400 dot-pulse inline-block"></span>
      Running
    </span>
  );
}

// ── Stat card ──────────────────────────────────────────────────────────────────
function StatCard({ label, value, sub, color = 'text-emerald-400' }) {
  return (
    <div className="card p-4 flex flex-col gap-1">
      <span className="text-slate-500 text-xs uppercase tracking-widest">{label}</span>
      <span className={`stat-val ${color}`}>{value}</span>
      {sub && <span className="text-slate-600 text-xs">{sub}</span>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// EXECUTION TIMELINE  (replaces flowchart — full step-by-step live feed)
// ═══════════════════════════════════════════════════════════════════════════════

// Live braille spinner
function Spinner({ color='#22c55e' }) {
  const F = ['⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏'];
  const [i,setI] = useState(0);
  useEffect(()=>{ const t=setInterval(()=>setI(x=>(x+1)%F.length),90); return ()=>clearInterval(t); },[]);
  return <span style={{color,fontFamily:'JetBrains Mono,monospace'}}>{F[i]}</span>;
}

function SIcon({ status, size=12 }) {
  if (status==='running') return <Spinner />;
  if (status==='done')    return <span style={{color:'#6366f1',fontSize:size}}>✓</span>;
  if (status==='failed')  return <span style={{color:'#ef4444',fontSize:size}}>✗</span>;
  return <span style={{color:'#2d3148',fontSize:size}}>○</span>;
}

// Phase bar — header strip with left-border colour accent, optionally collapsible
function PhaseBar({ label, status, color, detail, children }) {
  const [open, setOpen] = useState(true);
  const hasKids = children !== null && children !== undefined && children !== false;
  return (
    <div style={{marginBottom:8}}>
      <div className="tl-ph" onClick={()=>hasKids&&setOpen(o=>!o)}
        style={{display:'flex',alignItems:'center',gap:8,padding:'6px 10px',borderRadius:6,
                background:'#0d0f1c',borderLeft:`3px solid ${color}`,
                cursor:hasKids?'pointer':'default',userSelect:'none'}}>
        <span style={{flexShrink:0,fontFamily:'monospace',width:14}}><SIcon status={status}/></span>
        <span style={{color,fontWeight:700,fontSize:10,letterSpacing:1.2,
                      textTransform:'uppercase',flexShrink:0}}>{label}</span>
        {detail && <span style={{color:'#475569',fontSize:11,flex:1,overflow:'hidden',
                                 textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{detail}</span>}
        {hasKids && <span style={{color:'#374151',fontSize:9,marginLeft:'auto',flexShrink:0}}>
          {open?'▾':'▸'}</span>}
      </div>
      {hasKids && open && <div style={{paddingLeft:14,paddingTop:4}}>{children}</div>}
    </div>
  );
}

// Single tool-call step: icon + tool name + args preview; click to expand input/output
function StepRow({ step, replanBefore=false }) {
  const [open, setOpen] = useState(false);
  const col = tc(step.type||'');
  const hasDetail = step.input || step.output;
  const dur = (step.finished_at && step.started_at)
    ? `${step.finished_at - step.started_at}s` : null;

  return (
    <>
      {replanBefore && (
        <div style={{display:'flex',alignItems:'center',gap:6,padding:'3px 8px',
                     margin:'6px 0 4px',borderRadius:4,
                     background:'#1c180a',border:'1px solid #eab30840'}}>
          <span style={{color:'#eab308',fontSize:12}}>↩</span>
          <span style={{color:'#92400e',fontSize:10,letterSpacing:.8,fontWeight:600}}>REPLANNED</span>
        </div>
      )}
      <div className="tl-sr" onClick={()=>hasDetail&&setOpen(o=>!o)}
        style={{display:'flex',alignItems:'flex-start',gap:8,padding:'5px 8px',borderRadius:6,
                background:open?'#0d0f1c':'transparent',
                borderLeft:`2px solid ${col}55`,marginBottom:2,
                cursor:hasDetail?'pointer':'default'}}>
        <span style={{width:14,flexShrink:0,marginTop:1,fontFamily:'monospace'}}><SIcon status={step.status}/></span>
        <span style={{color:col,fontWeight:600,fontSize:11,flexShrink:0,minWidth:74}}>{step.type}</span>
        {step.input && (
          <span style={{color:'#475569',fontSize:11,flex:1,overflow:'hidden',
                        textOverflow:open?'clip':'ellipsis',
                        whiteSpace:open?'pre-wrap':'nowrap',wordBreak:'break-all'}}>
            {step.input}
          </span>
        )}
        {dur && <span style={{color:'#374151',fontSize:10,flexShrink:0,paddingLeft:4}}>{dur}</span>}
        {hasDetail && <span style={{color:'#374151',fontSize:9,flexShrink:0,paddingLeft:2}}>{open?'▴':'▾'}</span>}
      </div>
      {open && hasDetail && (
        <div style={{marginLeft:22,marginBottom:6,background:'#0a0c14',borderRadius:6,
                     border:'1px solid #1e2235',padding:'8px 10px'}}>
          {step.input && (
            <div style={{marginBottom:step.output?8:0}}>
              <div style={{color:'#374151',fontSize:9,letterSpacing:1,marginBottom:3,
                           fontWeight:600}}>INPUT</div>
              <pre style={{color:'#94a3b8',fontSize:11,margin:0,whiteSpace:'pre-wrap',
                           wordBreak:'break-all',maxHeight:140,overflowY:'auto',
                           fontFamily:'JetBrains Mono,monospace',lineHeight:1.5}}>
                {step.input}
              </pre>
            </div>
          )}
          {step.output && (
            <div>
              <div style={{color:'#374151',fontSize:9,letterSpacing:1,marginBottom:3,
                           fontWeight:600}}>OUTPUT</div>
              <pre style={{color:'#6ee7b7',fontSize:11,margin:0,whiteSpace:'pre-wrap',
                           wordBreak:'break-all',maxHeight:160,overflowY:'auto',
                           fontFamily:'JetBrains Mono,monospace',lineHeight:1.5}}>
                {step.output}
              </pre>
            </div>
          )}
        </div>
      )}
    </>
  );
}

// Sub-task section (when planner split into multiple sub-tasks)
const SUB_COLORS = ['#06b6d4','#34d399','#f59e0b','#a855f7','#f472b6','#60a5fa','#fb923c'];

function SubTaskSection({ sub, idx }) {
  const [open, setOpen] = useState(true);
  const steps = sub.steps || [];
  const col = SUB_COLORS[idx % SUB_COLORS.length];
  return (
    <div style={{marginBottom:8}}>
      <div className="tl-ph" onClick={()=>setOpen(o=>!o)}
        style={{display:'flex',alignItems:'center',gap:8,padding:'5px 10px',borderRadius:6,
                background:'#0f1221',borderLeft:`2px solid ${col}`,cursor:'pointer',
                userSelect:'none',marginBottom:4}}>
        <span style={{width:14,flexShrink:0,fontFamily:'monospace'}}><SIcon status={sub.status}/></span>
        <span style={{color:col,fontSize:11,fontWeight:600,flexShrink:0}}>{idx+1}.</span>
        <span style={{color:'#cbd5e1',fontSize:12,flex:1,overflow:'hidden',
                      textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sub.text}</span>
        <span style={{color:'#374151',fontSize:9,flexShrink:0}}>{open?'▾':'▸'}</span>
      </div>
      {open && (
        <div style={{paddingLeft:14}}>
          {steps.length===0 && sub.status==='pending' && (
            <div style={{color:'#374151',fontSize:11,padding:'3px 8px',fontStyle:'italic'}}>
              Waiting to start…
            </div>
          )}
          {steps.map((s,i) => {
            const replanBefore = s.replan===true && (i===0 || !steps[i-1].replan);
            return <StepRow key={i} step={s} replanBefore={replanBefore}/>;
          })}
        </div>
      )}
    </div>
  );
}

// Full execution timeline for one task — phases → steps → outputs, everything expandable
function ExecutionTimeline({ task }) {
  const tree    = task.tree    || {};
  const ext     = tree.extractor   || {};
  const planner = tree.planner     || {};
  const synth   = tree.synthesizer || {};
  const subs    = planner.sub_tasks || [];
  const isSingle = subs.length === 1;
  const now = Math.round(Date.now()/1000);
  const elapsed = task.finished_at
    ? `${task.finished_at - task.started_at}s`
    : `${now - (task.started_at||now)}s`;

  return (
    <div style={{padding:'12px 16px',overflowY:'auto',height:'100%',boxSizing:'border-box'}}>

      {/* ── Task prompt ────────────────────────────────────────────── */}
      <div style={{marginBottom:14,paddingBottom:12,borderBottom:'1px solid #1a1d2e'}}>
        <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
          <span className={task.status==='running'?'dot-pulse':''}
            style={{width:8,height:8,borderRadius:'50%',flexShrink:0,marginTop:4,
                    display:'inline-block',
                    background:task.status==='running'?'#22c55e':
                               task.status==='failed'?'#ef4444':'#6366f1'}}/>
          <div style={{flex:1}}>
            <div style={{color:'#e2e8f0',fontSize:13,fontWeight:600,lineHeight:1.5,marginBottom:2}}>
              {task.user_message}
            </div>
            <div style={{color:'#374151',fontSize:10}}>
              {elapsed} · session {task.session}
              {task.status !== 'running' && (
                <span style={{color: task.status==='done'?'#6366f1':'#ef4444',marginLeft:8,
                              fontWeight:600,textTransform:'uppercase',fontSize:9}}>
                  {task.status}
                </span>
              )}
            </div>
          </div>
        </div>
      </div>

      {/* ── Context (memory extraction) ────────────────────────────── */}
      {ext.status && ext.status !== 'pending' && (
        <PhaseBar label="Context" status={ext.status} color="#0ea5e9"
                  detail={ext.output || ext.input}/>
      )}

      {/* ── Plan ───────────────────────────────────────────────────── */}
      {planner.status && planner.status !== 'pending' && (
        !isSingle && subs.length > 0 ? (
          <PhaseBar label="Plan" status={planner.status} color="#818cf8">
            <div style={{paddingLeft:6,paddingTop:2,paddingBottom:4}}>
              {subs.map((s,i) => (
                <div key={i} style={{display:'flex',alignItems:'center',gap:6,
                                     padding:'2px 0',fontSize:11}}>
                  <span style={{color:'#374151',width:18,flexShrink:0,textAlign:'right'}}>{i+1}.</span>
                  <span style={{flexShrink:0,fontFamily:'monospace',width:12}}><SIcon status={s.status} size={10}/></span>
                  <span style={{color:'#64748b',overflow:'hidden',textOverflow:'ellipsis',
                                whiteSpace:'nowrap',flex:1}}>{s.text}</span>
                </div>
              ))}
            </div>
          </PhaseBar>
        ) : (
          <PhaseBar label="Plan" status={planner.status} color="#818cf8"
                    detail={subs[0]?.text || planner.output}/>
        )
      )}

      {/* ── Execution steps ────────────────────────────────────────── */}
      {subs.length > 0 && (
        <div style={{marginBottom:8}}>
          {isSingle ? (
            // Single sub-task: steps shown directly, no extra nesting
            (subs[0].steps||[]).length > 0 ? (
              (subs[0].steps||[]).map((s,i) => {
                const replanBefore = s.replan===true && (i===0||!subs[0].steps[i-1].replan);
                return <StepRow key={i} step={s} replanBefore={replanBefore}/>;
              })
            ) : (
              subs[0].status === 'pending' && (
                <div style={{color:'#374151',fontSize:11,padding:'3px 8px',fontStyle:'italic'}}>
                  Planning steps…
                </div>
              )
            )
          ) : (
            subs.map((sub,i) => <SubTaskSection key={i} sub={sub} idx={i}/>)
          )}
        </div>
      )}

      {/* ── Synthesize ─────────────────────────────────────────────── */}
      {synth.status && synth.status !== 'pending' && (
        synth.output ? (
          <PhaseBar label="Synthesize" status={synth.status} color="#a855f7"
                    detail={synth.status==='running'?'Building answer…':null}>
            <div style={{background:'#0d0f1c',borderRadius:6,padding:'10px 12px',
                         border:'1px solid #1e2235',fontSize:12,color:'#cbd5e1',
                         whiteSpace:'pre-wrap',maxHeight:200,overflowY:'auto',
                         lineHeight:1.65,fontFamily:'JetBrains Mono,monospace'}}>
              {synth.output}
            </div>
          </PhaseBar>
        ) : (
          <PhaseBar label="Synthesize" status={synth.status} color="#a855f7"
                    detail={synth.status==='running'?'Building answer…':null}/>
        )
      )}

      {/* ── Micro-loop (internal think/search/plan steps) ──────────── */}
      {task.steps?.length > 0 && (
        <PhaseBar label="Agent steps" status="done" color="#475569"
                  detail={`${task.steps.length} internal step${task.steps.length!==1?'s':''}`}>
          {task.steps.map((s,i) => (
            <StepRow key={i} step={{
              type: s.type||'step',
              input: s.input||s.text||'',
              output: s.output||'',
              status: s.status||'done',
              started_at: s.started_at,
              finished_at: s.finished_at,
            }}/>
          ))}
        </PhaseBar>
      )}

      {/* Empty state — task just started */}
      {!ext.status && !planner.status && (
        <div style={{display:'flex',alignItems:'center',gap:10,color:'#374151',
                     fontSize:12,padding:'20px 8px'}}>
          <Spinner color="#374151"/>
          <span>Initialising…</span>
        </div>
      )}

    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// MEMORY GRAPH  (right pane) — simple force-directed via d3-lite in pure JS
// ═══════════════════════════════════════════════════════════════════════════════

function useForceLayout(nodes, edges, w, h) {
  // Minimal force simulation: spring + repulsion, no d3 dependency
  const posRef = useRef({});
  const [positions, setPositions] = useState({});

  useEffect(() => {
    if (!nodes.length) return;

    // Initialise positions (random if new node)
    const pos = {};
    nodes.forEach(n => {
      pos[n.id] = posRef.current[n.id] || {
        x: w/2 + (Math.random()-0.5)*w*0.7,
        y: h/2 + (Math.random()-0.5)*h*0.7,
        vx: 0, vy: 0,
      };
    });

    const edgeMap = {};
    edges.forEach(e => {
      if (!edgeMap[e.source]) edgeMap[e.source] = [];
      if (!edgeMap[e.target]) edgeMap[e.target] = [];
      edgeMap[e.source].push(e.target);
      edgeMap[e.target].push(e.source);
    });

    let frame = 0;
    const SIM_STEPS = 80;
    const SPRING_LEN = 80, SPRING_K = 0.04;
    const REPULSE = 1200, DAMP = 0.82, BOUND = 0.12;

    function tick() {
      if (frame++ >= SIM_STEPS) {
        posRef.current = pos;
        setPositions({...pos});
        return;
      }
      const ids = Object.keys(pos);
      // Repulsion
      for (let i = 0; i < ids.length; i++) {
        for (let j = i+1; j < ids.length; j++) {
          const a = pos[ids[i]], b = pos[ids[j]];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d2 = dx*dx + dy*dy + 1;
          const f = REPULSE / d2;
          a.vx += f*dx; a.vy += f*dy;
          b.vx -= f*dx; b.vy -= f*dy;
        }
      }
      // Springs
      edges.forEach(e => {
        const a = pos[e.source], b = pos[e.target];
        if (!a || !b) return;
        const dx = b.x - a.x, dy = b.y - a.y;
        const d = Math.sqrt(dx*dx + dy*dy) || 1;
        const f = (d - SPRING_LEN) * SPRING_K;
        a.vx += f*dx/d; a.vy += f*dy/d;
        b.vx -= f*dx/d; b.vy -= f*dy/d;
      });
      // Centre gravity
      ids.forEach(id => {
        const p = pos[id];
        p.vx += (w/2 - p.x) * BOUND;
        p.vy += (h/2 - p.y) * BOUND;
        p.vx *= DAMP; p.vy *= DAMP;
        p.x += p.vx; p.y += p.vy;
        p.x = Math.max(16, Math.min(w-16, p.x));
        p.y = Math.max(16, Math.min(h-16, p.y));
      });
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }, [nodes.length, edges.length]);

  return positions;
}

function MemoryGraph({ nodes, edges, w, h }) {
  const [hover, setHover] = useState(null);
  const positions = useForceLayout(nodes, edges, w, h);

  if (!nodes.length) return (
    <div className="flex items-center justify-center h-full text-slate-600 text-xs text-center p-4">
      No graph nodes yet.<br/>Send a few messages to start building memory.
    </div>
  );

  return (
    <div style={{ position:'relative', width:w, height:h, overflow:'hidden' }}>
      <svg width={w} height={h} style={{ position:'absolute', inset:0 }}>
        {/* Edges */}
        {edges.map((e, i) => {
          const a = positions[e.source], b = positions[e.target];
          if (!a || !b) return null;
          return (
            <line key={i} x1={a.x} y1={a.y} x2={b.x} y2={b.y}
              stroke="#1e2235" strokeWidth={1} />
          );
        })}
        {/* Nodes */}
        {nodes.map(n => {
          const p = positions[n.id];
          if (!p) return null;
          const color = ntc(n.type);
          const isHov = hover === n.id;
          return (
            <g key={n.id} className="mg-node"
               onMouseEnter={() => setHover(n.id)}
               onMouseLeave={() => setHover(null)}>
              <circle cx={p.x} cy={p.y} r={isHov ? 8 : 5}
                fill={color} fillOpacity={0.85}
                stroke={isHov ? '#fff' : color}
                strokeWidth={isHov ? 1.5 : 0.5} />
            </g>
          );
        })}
      </svg>

      {/* Hover tooltip */}
      {hover && (() => {
        const n = nodes.find(x => x.id === hover);
        const p = positions[hover];
        if (!n || !p) return null;
        const left = p.x + 12 > w - 180 ? p.x - 190 : p.x + 12;
        const top  = Math.min(p.y - 10, h - 80);
        return (
          <div style={{ position:'absolute', left, top,
                        background:'#1a1d2e', border:`1px solid ${ntc(n.type)}44`,
                        borderRadius:8, padding:'8px 10px', maxWidth:180,
                        pointerEvents:'none', zIndex:10 }}>
            <div className="text-xs font-semibold" style={{ color: ntc(n.type) }}>{n.label}</div>
            <div className="text-xs text-slate-500 mt-0.5">{n.type}</div>
            {n.summary && <div className="text-xs text-slate-400 mt-1 leading-relaxed">{n.summary}</div>}
          </div>
        );
      })()}

      {/* Legend */}
      <div style={{ position:'absolute', bottom:8, left:8,
                    background:'#0a0c14cc', borderRadius:6, padding:'6px 8px',
                    display:'flex', flexWrap:'wrap', gap:'6px 12px', maxWidth: w-16 }}>
        {Object.entries(NODE_TYPE_COLOR).map(([t, c]) => (
          <span key={t} style={{ display:'flex', alignItems:'center', gap:4, fontSize:9, color:'#64748b' }}>
            <span style={{ width:7, height:7, borderRadius:'50%', background:c, display:'inline-block' }} />
            {t}
          </span>
        ))}
      </div>
    </div>
  );
}

// StepPill and CompletedTask removed — ExecutionTimeline supersedes them.

// ═══════════════════════════════════════════════════════════════════════════════
// AGENT ACTIVITY  (improved)
// ═══════════════════════════════════════════════════════════════════════════════

const KIND_STYLE = {
  tool:   { dot:'bg-indigo-400',  text:'text-indigo-300',  label:'Tool'   },
  bash:   { dot:'bg-yellow-400',  text:'text-yellow-300',  label:'Bash'   },
  answer: { dot:'bg-emerald-400', text:'text-emerald-300', label:'Answer' },
  write:  { dot:'bg-violet-400',  text:'text-violet-300',  label:'Write'  },
  error:  { dot:'bg-red-400',     text:'text-red-300',     label:'Error'  },
  stage:  { dot:'bg-sky-400',     text:'text-sky-300',     label:'Stage'  },
  llm:    { dot:'bg-amber-400',   text:'text-amber-300',   label:'LLM'    },
  plan:   { dot:'bg-purple-400',  text:'text-purple-300',  label:'Plan'   },
};

function EventRow({ r }) {
  const [open, setOpen] = useState(false);
  const s = KIND_STYLE[r.kind] || KIND_STYLE.tool;
  const d = r.data || {};

  const actionColor = {
    bash:'#eab308', answer:'#34d399', synthesize:'#34d399',
    plan:'#818cf8', search:'#06b6d4', web_search:'#06b6d4',
    write:'#7c3aed', read:'#10b981',
  }[d.action] || '#cbd5e1';

  const hasDetail = d.result || d.answer_preview || d.steps;

  return (
    <div className="ev-row py-2 text-xs">
      <div className="flex items-center gap-2 cursor-pointer px-3"
           onClick={() => hasDetail && setOpen(o => !o)}>
        <span className="text-slate-700 w-14 shrink-0 tabular-nums">{timeAgo(r.ts)}</span>
        <span className={`w-1.5 h-1.5 rounded-full shrink-0 ${s.dot}`} />
        <span className="font-mono font-semibold" style={{ color: actionColor, minWidth: 80 }}>
          {d.action || r.label}
        </span>
        {d.tool && d.tool !== d.action &&
          <span className="text-slate-500">→ <span style={{color: tc(d.tool)}}>{d.tool}</span></span>}
        {d.input && <span className="text-slate-500 truncate flex-1" style={{maxWidth:220}}>{d.input}</span>}
        {d.elapsed_ms && <span className="text-slate-700 ml-auto shrink-0">{elapsedFmt(d.elapsed_ms)}</span>}
        {hasDetail && <span className="text-slate-700 shrink-0 ml-1">{open ? '▲' : '▼'}</span>}
      </div>
      {open && (d.result || d.answer_preview) && (
        <div className="mx-3 mt-1.5 rounded p-2 text-slate-300 font-mono text-xs max-h-36 overflow-y-auto"
             style={{background:'#0d0f1c', whiteSpace:'pre-wrap'}}>
          {d.result || d.answer_preview}
        </div>
      )}
      {open && d.steps && (
        <div className="mx-3 mt-1 space-y-0.5">
          {d.steps.map((st,i) => (
            <div key={i} className="flex items-center gap-2 text-xs text-slate-500">
              <span className="text-slate-700">{i+1}.</span>
              <span className="font-mono" style={{color: tc(st.type||st.tool)}}>[{st.type||st.tool}]</span>
              <span className="truncate">{st.text||st.input||''}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

const ALL_KINDS = ['stage','llm','plan','tool','bash','write','answer','error'];

function ActivityPanel({ events }) {
  const [filter, setFilter] = useState(null);

  if (!events?.length) return (
    <div className="card p-5 text-slate-600 text-xs text-center">
      No activity yet — send a message to see agent steps here.
    </div>
  );

  const visible = filter ? events.filter(e => e.kind === filter) : events;
  const counts = {};
  for (const e of events) counts[e.kind] = (counts[e.kind] || 0) + 1;

  // Group by session
  const groups = [];
  const seen = {};
  for (const r of visible) {
    const key = r.session || '—';
    if (!seen[key]) { seen[key] = []; groups.push({ key, events: seen[key] }); }
    seen[key].push(r);
  }

  return (
    <div className="card overflow-hidden">
      {/* Header */}
      <div className="flex items-center justify-between px-4 py-3 border-b border-slate-800/60 flex-wrap gap-2">
        <span className="text-slate-400 text-xs uppercase tracking-widest">Agent Activity</span>
        <div className="flex items-center gap-1 flex-wrap">
          <button onClick={() => setFilter(null)}
            className={`px-2 py-0.5 rounded text-xs border transition-colors ${
              filter === null ? 'bg-slate-700 border-slate-500 text-white' : 'border-slate-800 text-slate-600 hover:text-slate-300'
            }`}>all</button>
          {ALL_KINDS.filter(k => counts[k]).map(k => {
            const st = KIND_STYLE[k] || KIND_STYLE.tool;
            return (
              <button key={k} onClick={() => setFilter(filter === k ? null : k)}
                className={`px-2 py-0.5 rounded text-xs border transition-colors ${
                  filter === k ? 'bg-slate-700 border-slate-500 text-white' : 'border-slate-800 text-slate-600 hover:text-slate-300'
                }`}>
                <span className={`inline-block w-1.5 h-1.5 rounded-full mr-1 ${st.dot}`} />
                {k}<span className="text-slate-700 ml-0.5">({counts[k]})</span>
              </button>
            );
          })}
        </div>
      </div>

      <div className="overflow-y-auto" style={{maxHeight: 360}}>
        {groups.map(g => (
          <div key={g.key}>
            <div className="px-3 py-1.5 text-slate-700 text-xs font-mono border-b border-slate-800/40"
                 style={{background:'#0d0f1c'}}>
              session {g.key.slice(0,12)}
            </div>
            {g.events.map((r, i) => <EventRow key={i} r={r} />)}
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// MEMORY GRAPH PANE  (header + graph, reused in split and full-width modes)
// ═══════════════════════════════════════════════════════════════════════════════

function MemoryGraphPane({ graph, h, splitMode }) {
  const containerRef = useRef(null);
  const [width, setWidth] = useState(splitMode
    ? Math.floor((window.innerWidth - 80) / 2)
    : Math.max(600, window.innerWidth - 80));

  useEffect(() => {
    if (!containerRef.current) return;
    const obs = new ResizeObserver(entries => {
      for (const e of entries) setWidth(Math.max(200, e.contentRect.width));
    });
    obs.observe(containerRef.current);
    return () => obs.disconnect();
  }, []);

  return (
    <div className={splitMode ? 'flex flex-col' : 'flex flex-col'} style={{ height: h }}>
      <div className="px-4 py-2 border-b border-slate-800/40 flex items-center justify-between">
        <span className="text-slate-500 text-xs uppercase tracking-widest">
          Memory Graph
        </span>
        <span className="text-slate-700 text-xs font-mono">
          {graph.nodes.length} nodes · {graph.edges.length} edges
        </span>
      </div>
      <div ref={containerRef} style={{ flex:1, overflow:'hidden', position:'relative' }}>
        <MemoryGraph
          nodes={graph.nodes}
          edges={graph.edges}
          w={width}
          h={h - 40}
        />
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════════

function App() {
  const [status, setStatus] = useState(null);
  const [tasks,  setTasks]  = useState([]);
  const [graph,  setGraph]  = useState({ nodes: [], edges: [] });
  const [error,  setError]  = useState(null);
  const [lastFetch, setLastFetch] = useState(null);
  const [paneH,  setPaneH]  = useState(500);
  const paneRef = useRef(null);

  // Adaptive pane height
  useEffect(() => {
    const obs = new ResizeObserver(entries => {
      for (const e of entries) setPaneH(Math.max(350, e.contentRect.height - 20));
    });
    if (paneRef.current) obs.observe(paneRef.current);
    return () => obs.disconnect();
  }, []);

  const fetchAll = useCallback(async () => {
    try {
      const [sr, tr, gr] = await Promise.all([
        fetch('/api/status'),
        fetch('/api/tasks'),
        fetch('/api/graph'),
      ]);
      if (sr.ok) { const d = await sr.json(); setStatus(d); }
      if (tr.ok) { const d = await tr.json(); setTasks(d.tasks || []); }
      if (gr.ok) { const d = await gr.json(); setGraph(d); }
      setError(null);
      setLastFetch(Date.now());
    } catch(e) {
      setError(e.message);
    }
  }, []);

  useEffect(() => {
    fetchAll();
    const id = setInterval(fetchAll, 3000);
    return () => clearInterval(id);
  }, [fetchAll]);

  const running   = tasks.find(t => t.status === 'running');
  const completed = tasks.find(t => t.status !== 'running');

  return (
    <div className="min-h-screen p-5 flex flex-col gap-5 max-w-screen-xl mx-auto">

      {/* ── Header ─────────────────────────────────────────────────── */}
      <div className="flex items-center justify-between">
        <div className="flex items-center gap-3">
          <img src="/assets/sisyphean-transparent.png" alt="" className="w-9 h-9 object-contain" />
          <h1 className="text-lg font-semibold text-slate-100 tracking-tight">Sisyphean Engine</h1>
        </div>
        <div className="flex items-center gap-3">
          {status && <StatusBadge running mock={status.mock} llmReady={status.llm_ready} />}
          {error   && <StatusBadge running={false} />}
          {lastFetch && (
            <span className="text-slate-700 text-xs">
              {new Date(lastFetch).toLocaleTimeString()}
            </span>
          )}
        </div>
      </div>

      {error && (
        <div className="card p-4 border-red-900/60 text-red-400 text-sm">
          Engine unreachable — {error}. Retrying…
        </div>
      )}

      {status && (
        <>
          {/* ── Stats ──────────────────────────────────────────────── */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            <StatCard label="Uptime"      value={formatUptime(status.uptime_seconds)} />
            <StatCard label="Requests"    value={status.requests_total} color="text-indigo-400" />
            <StatCard label="Graph nodes" value={status.graph_nodes}    color="text-violet-400" />
            <StatCard label="Artifacts"   value={status.artifacts}      color="text-sky-400" />
          </div>

          {/* ── Model + workspace ─────────────────────────────────── */}
          <div className="card p-4 grid md:grid-cols-2 gap-4">
            <div>
              <span className="text-slate-500 text-xs uppercase tracking-widest">Model</span>
              <p className="text-slate-200 mt-1 text-sm font-mono truncate">{status.model}</p>
            </div>
            <div>
              <span className="text-slate-500 text-xs uppercase tracking-widest">Workspace</span>
              <p className="text-slate-200 mt-1 text-sm font-mono truncate">{status.workspace}</p>
            </div>
          </div>

          {/* ── Active task: execution timeline + memory graph ────────── */}
          {running ? (
            <div>
              <div className="text-slate-500 text-xs uppercase tracking-widest mb-2 px-1">
                Active task
              </div>
              <div ref={paneRef} className="card overflow-hidden"
                   style={{ display:'grid', gridTemplateColumns:'55fr 45fr', minHeight:480 }}>
                {/* Left — live execution timeline */}
                <div className="border-r border-slate-800/60"
                     style={{ height: paneH, overflow:'hidden' }}>
                  <ExecutionTimeline task={running}/>
                </div>
                {/* Right — memory graph */}
                <MemoryGraphPane graph={graph} h={paneH} splitMode/>
              </div>
            </div>
          ) : (
            /* ── Memory graph full-width when idle ──────────────────── */
            <div>
              <div className="text-slate-500 text-xs uppercase tracking-widest mb-2 px-1">
                Memory Graph
              </div>
              <div ref={paneRef} className="card overflow-hidden">
                <MemoryGraphPane graph={graph} h={Math.max(420, paneH)} splitMode={false}/>
              </div>
            </div>
          )}

          {/* ── Last completed task — always shown below ───────────── */}
          {completed && (
            <div>
              <div className="text-slate-500 text-xs uppercase tracking-widest mb-2 px-1">
                Last completed
              </div>
              <div className="card overflow-hidden" style={{ maxHeight: 600 }}>
                <ExecutionTimeline task={completed}/>
              </div>
            </div>
          )}

          {/* ── Agent activity ─────────────────────────────────────── */}
          <div>
            <div className="text-slate-500 text-xs uppercase tracking-widest mb-2 px-1">Agent Activity</div>
            <ActivityPanel events={status.recent || []} />
          </div>
        </>
      )}

      {!status && !error && (
        <div className="text-slate-600 text-sm text-center py-24">Loading…</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
