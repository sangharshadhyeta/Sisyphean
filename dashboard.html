<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sisyphean</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; }
body {
  background: #0a0c14;
  color: #e2e8f0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  overflow: hidden;
}
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #3d4160; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
@keyframes fadeIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
.pulse  { animation: pulse  1.8s ease-in-out infinite; }
.fadein { animation: fadeIn 0.15s ease-out; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useReducer, useRef, memo } = React;

// ── Colour tables ──────────────────────────────────────────────────────────

const TOOL_COLOR = {
  web_search:'#06b6d4', websearch:'#06b6d4',
  web_fetch:'#0891b2',  webfetch:'#0891b2',
  search_memory:'#38bdf8', search_knowledge:'#38bdf8',
  save_memory:'#ec4899',
  bash:'#eab308', powershell:'#d97706', shell:'#eab308',
  write:'#7c3aed', write_plan:'#6d28d9',
  write_code:'#22c55e', write_doc:'#6ab0f5',
  read:'#10b981', glob:'#34d399', grep:'#6ee7b7',
  edit:'#f59e0b', multiedit:'#f59e0b',
  run_skill:'#f472b6', direct:'#475569',
};

// Stage names match pipeline trace labels exactly — new stages appear automatically
// S0 context → S1 plan (make_plan) → S2 decompose (think_decompose/stage) → S3 route (plan_task/step) → S4 execute → S5 synthesize
const STAGE = {
  start:       { icon:'◆', color:'#818cf8', badge:'START'   },
  plan:        { icon:'⊞', color:'#6366f1', badge:'PLAN'    },  // S1: make_plan high-level output
  decompose:   { icon:'⊡', color:'#8b5cf6', badge:'DECOMP'  },  // S2: think_decompose per stage
  route:       { icon:'⇒', color:'#60a5fa', badge:'ROUTE'   },  // S3: plan_task tool selection
  step:        { icon:'●', color:'#f59e0b', badge:'RUN'     },  // S4: step executing
  step_done:   { icon:'✓', color:'#34d399', badge:'DONE'    },  // S4: step completed
  outer_tool:  { icon:'⬆', color:'#ca8a04', badge:'CALL'    },  // S4: outer tool dispatched
  tool_result: { icon:'⬇', color:'#16a34a', badge:'RECV'    },  // S4: result received
  replan:      { icon:'↺', color:'#f97316', badge:'REPLAN'  },  // S4→S2: subtask feedback
  s5_feedback: { icon:'⟳', color:'#ec4899', badge:'OUTCOME' },  // S5→S1: outcome feedback
  import_fix:  { icon:'⚑', color:'#f97316', badge:'FIX'     },
  synthesize:  { icon:'◎', color:'#06b6d4', badge:'SYNTH'   },  // S5
  answer:      { icon:'✦', color:'#34d399', badge:'ANSWER'  },  // S5 output
};

// Fallback for unknown future stages
function stageMeta(stage) {
  return STAGE[stage] || { icon:'·', color:'#475569', badge: stage.toUpperCase().slice(0,8) };
}

const NODE_COLOR = {
  soul:'#a78bfa', policy:'#a78bfa', user:'#34d399', project:'#f59e0b',
  fact:'#60a5fa', concept:'#38bdf8', entity:'#818cf8', skill:'#f472b6',
  system:'#94a3b8', session:'#64748b', preference:'#a3e635',
  url:'#fb923c', research:'#22d3ee',
};

// ── Utilities ──────────────────────────────────────────────────────────────

function fmtTime(s) {
  if (!s || s < 0) return '';
  if (s < 60)   return `${s.toFixed(1)}s`;
  if (s < 3600) return `${Math.floor(s/60)}m${Math.round(s%60)}s`;
  return `${Math.floor(s/3600)}h${Math.floor((s%3600)/60)}m`;
}
function uptime(s) {
  if (!s) return '0s';
  if (s < 60)   return `${s}s`;
  if (s < 3600) return `${Math.floor(s/60)}m`;
  return `${Math.floor(s/3600)}h${Math.floor((s%3600)/60)}m`;
}
function toolColor(key, value) {
  // Try to extract a tool name from key ("bash/0.1") or value ("bash: cmd")
  const from = (s) => { const m=s.match(/^([a-z_]+)[:/\s]/); return m?m[1]:null; };
  const name = from(key) || from(value||'');
  if (name && TOOL_COLOR[name]) return TOOL_COLOR[name];
  for (const [k,v] of Object.entries(TOOL_COLOR))
    if ((key+' '+(value||'')).toLowerCase().includes(k)) return v;
  return null;
}
function findLastIdx(arr, pred) {
  for (let i=arr.length-1; i>=0; i--) if(pred(arr[i])) return i;
  return -1;
}
function stepIdx(key) { const m=key.match(/\/(\d+\.\d+)$/); return m?m[1]:key; }

// ── Task state helpers ─────────────────────────────────────────────────────

function makeRow(e) {
  return { id:`${e.stage}:${e.key}:${e.ts}`, stage:e.stage, key:e.key,
           value:e.value, ts:e.ts, status:'done', extra:'' };
}

function applyTrace(task, e) {
  if (!task) task = { id:'', query:'', startedAt:0, status:'running', rows:[], answer:'' };

  if (e.stage === 'start')
    return { ...task, id:e.task_id, query:e.value, startedAt:e.ts, status:'running' };

  if (e.stage === 'answer')
    return { ...task, status:'done', answer:e.value,
             elapsed: e.ts-(task.startedAt||e.ts),
             rows:[...task.rows, makeRow(e)] };

  if (e.stage === 'step_done') {
    const si = stepIdx(e.key);
    const idx = findLastIdx(task.rows, r=>r.stage==='step'&&stepIdx(r.key)===si);
    if (idx !== -1) {
      const rows=[...task.rows];
      rows[idx]={...rows[idx], stage:'step_done', status:'done', extra:e.value};
      return {...task, rows};
    }
    return {...task, rows:[...task.rows, makeRow(e)]};
  }

  if (e.stage === 'tool_result') {
    const idx = findLastIdx(task.rows, r=>r.stage==='outer_tool'&&r.status==='running');
    if (idx !== -1) {
      const rows=[...task.rows];
      rows[idx]={...rows[idx], status:'done', extra:e.value};
      return {...task, rows};
    }
    return {...task, rows:[...task.rows, makeRow(e)]};
  }

  if (e.stage==='step'||e.stage==='outer_tool')
    return {...task, rows:[...task.rows, {...makeRow(e), status:'running'}]};

  return {...task, rows:[...task.rows, makeRow(e)]};
}

// Convert task-tracker format (bootstrap) to internal format
function fromApiTask(t) {
  const rows = [];
  const plan = t.tree?.planner;
  if (plan?.output)
    rows.push({id:'plan0',stage:'decompose',key:'stages',value:plan.output,
               ts:t.started_at,status:'done',extra:''});
  for (const [ti,st] of (plan?.sub_tasks||[]).entries())
    for (const [si,s] of (st.steps||[]).entries()) {
      const done = s.status!=='running';
      rows.push({id:`s${ti}_${si}`,stage:done?'step_done':'step',
                 key:`${s.type}/${ti}.${si}`,value:s.input||'',
                 ts:s.ts||t.started_at,status:done?'done':'running',extra:s.output||''});
    }
  const sy = t.tree?.synthesizer;
  if (sy?.output)
    rows.push({id:'ans',stage:'answer',key:'answer',value:sy.output,
               ts:t.finished_at||t.started_at,status:'done',extra:''});
  return { id:t.id, query:t.user_message||t.id, startedAt:t.started_at,
           status:t.status, rows, answer:sy?.output||'',
           elapsed:t.finished_at?t.finished_at-t.started_at:0 };
}

// ── Reducer ────────────────────────────────────────────────────────────────

const initState = {
  tasks:{}, order:[],
  status:{model:'…',uptime_seconds:0,requests_total:0,graph_nodes:0,
          artifacts:0,workspace:'',llm_ready:false,mock:false},
  graph:{nodes:[],edges:[]},
  connected:false,
};

function reducer(state, action) {
  switch(action.type) {
    case 'TRACE': {
      const e=action.event;
      if (!e.task_id) return state;
      const updated = applyTrace(state.tasks[e.task_id], e);
      const order = state.order.includes(e.task_id)
        ? state.order : [e.task_id,...state.order].slice(0,50);
      return {...state, tasks:{...state.tasks,[e.task_id]:updated}, order};
    }
    case 'BOOTSTRAP': {
      const tasks={...state.tasks}, order=[...state.order];
      for (const t of action.payload) {
        if (!tasks[t.id]) {
          tasks[t.id]=fromApiTask(t);
          if (!order.includes(t.id)) order.push(t.id);
        }
      }
      order.sort((a,b)=>(tasks[b]?.startedAt||0)-(tasks[a]?.startedAt||0));
      return {...state, tasks, order:order.slice(0,50)};
    }
    case 'STATUS':     return {...state, status:{...state.status,...action.payload}};
    case 'GRAPH':      return {...state, graph:action.payload};
    case 'CONNECT':    return {...state, connected:true};
    case 'DISCONNECT': return {...state, connected:false};
    default: return state;
  }
}

// ── UI components ──────────────────────────────────────────────────────────

function Dot({color, pulse=false, size=7}) {
  return <span style={{
    display:'inline-block', width:size, height:size, borderRadius:'50%',
    background:color, flexShrink:0,
    animation:pulse?'pulse 1.8s ease-in-out infinite':'none',
  }}/>;
}

function StatusBar({status, connected}) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:16,padding:'8px 16px',
                 background:'#0c0e1a',borderBottom:'1px solid #1a1d2e',flexShrink:0}}>
      <span style={{color:'#818cf8',fontWeight:700,fontSize:13,letterSpacing:2}}>SISYPHEAN</span>
      <Dot color={status.llm_ready?'#34d399':'#ef4444'} pulse={!status.llm_ready}/>
      <span style={{color:'#2d3558'}}>|</span>
      <span style={{color:'#a0aec0'}}>{status.model}</span>
      <span style={{color:'#2d3558'}}>|</span>
      <span style={{color:'#4a5580'}}>↑{uptime(status.uptime_seconds)}</span>
      <span style={{color:'#4a5580'}}>{status.requests_total} req</span>
      <span style={{color:'#4a5580'}}>{status.graph_nodes} nodes</span>
      <span style={{color:'#4a5580'}}>{status.artifacts} artifacts</span>
      {status.mock && <span style={{color:'#f59e0b',fontSize:10,border:'1px solid #f59e0b44',padding:'1px 5px',borderRadius:3}}>MOCK</span>}
      <div style={{flex:1}}/>
      <span style={{color:'#3d4a65',fontSize:10,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:280}}>
        {status.workspace}
      </span>
      <Dot color={connected?'#34d399':'#f97316'} pulse={!connected} size={6}/>
      <span style={{color:connected?'#34d399':'#f97316',fontSize:10}}>{connected?'LIVE':'RECONNECTING'}</span>
    </div>
  );
}

// One row per trace event — renders whatever stage the pipeline emitted
const EventRow = memo(function EventRow({row, startedAt}) {
  const [open, setOpen] = useState(false);
  const meta   = stageMeta(row.stage);
  const tc     = toolColor(row.key, row.value) || meta.color;
  const isRun  = row.status === 'running';

  // key hint: "verify/0.1" → show "0.1"
  const keyHint = row.key.includes('/') ? row.key.replace(/^[^/]+\//,'') : '';
  const preview = row.value.length > 90 ? row.value.slice(0,90)+'…' : row.value;
  const hasMore = row.value.length > 90 || row.extra;
  const dt      = startedAt && row.ts ? `+${fmtTime(row.ts-startedAt)}` : '';

  return (
    <div className={isRun?'':'fadein'}
         style={{borderLeft:`2px solid ${tc}15`,marginLeft:10}}>
      <div
        onClick={() => hasMore && setOpen(o=>!o)}
        style={{display:'flex',alignItems:'baseline',gap:6,padding:'2px 8px 2px 10px',
                cursor:hasMore?'pointer':'default'}}
      >
        <span style={{width:54,flexShrink:0,fontSize:10,fontWeight:600,
                      color:meta.color,letterSpacing:0.3}}>
          <span style={{animation:isRun?'pulse 1.8s ease-in-out infinite':'none'}}>{meta.icon}</span>
          {' '}{meta.badge}
        </span>
        {keyHint &&
          <span style={{color:tc,fontSize:10,fontWeight:500,flexShrink:0,opacity:.7}}>
            {keyHint}
          </span>}
        <span style={{color:isRun?'#94a3b8':'#7a8da8',fontSize:11,flex:1,
                      overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',minWidth:0}}>
          {preview}
        </span>
        {dt && <span style={{color:'#3d4a5f',fontSize:10,flexShrink:0}}>{dt}</span>}
        {hasMore && <span style={{color:'#3d4a5f',fontSize:9,flexShrink:0}}>{open?'▲':'▼'}</span>}
      </div>
      {open &&
        <div style={{margin:'4px 10px 4px 20px',padding:'8px 12px',background:'#111827',
                     borderRadius:6,color:'#7dd3fc',fontSize:11,lineHeight:1.65,
                     whiteSpace:'pre-wrap',wordBreak:'break-all',maxHeight:220,overflow:'auto',
                     border:'1px solid #1e2745'}}>
          {row.value}{row.extra?`\n\n${row.extra}`:''}
        </div>}
    </div>
  );
});

function TaskCard({task}) {
  const [collapsed, setCollapsed] = useState(false);
  const isRun = task.status==='running';
  const sc    = isRun?'#f59e0b':task.status==='done'?'#34d399':'#ef4444';
  const et    = task.elapsed ? fmtTime(task.elapsed) : '';
  const visRows = task.rows.filter(r=>r.stage!=='start'&&r.stage!=='answer');

  return (
    <div className="fadein"
         style={{marginBottom:12,
                 border:`1px solid ${isRun?'#252d4a':'#1a1d2e'}`,
                 borderRadius:12,overflow:'hidden',background:'#0f1220',
                 boxShadow: isRun
                   ? '0 0 0 1px #6366f122, 0 4px 20px rgba(0,0,0,0.4)'
                   : '0 2px 12px rgba(0,0,0,0.3)'}}>
      <div onClick={()=>setCollapsed(c=>!c)}
           style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',
                   background:'#12152a',cursor:'pointer',
                   borderBottom:collapsed?'none':'1px solid #1a1d2e'}}>
        <Dot color={sc} pulse={isRun}/>
        <span style={{flex:1,color:'#e2e8f0',fontSize:12,fontWeight:500,
                      overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
          {task.query||task.id}
        </span>
        {et && <span style={{color:'#4a5580',fontSize:10,flexShrink:0}}>{et}</span>}
        <span style={{color:'#2d3558',fontSize:9}}>{collapsed?'▼':'▲'}</span>
      </div>

      {!collapsed && (
        <div style={{padding:'5px 0 6px'}}>
          {visRows.map((row,i) =>
            <EventRow key={row.id||i} row={row} startedAt={task.startedAt}/>)}

          {/* Answer */}
          {task.answer &&
            <div style={{margin:'8px 10px 5px',padding:'10px 14px',
                         background:'#0d1a22',borderRadius:8,
                         border:'1px solid #1e3a2e',
                         boxShadow:'inset 0 0 20px rgba(52,211,153,0.04)'}}>
              <div style={{color:'#34d399',fontSize:10,fontWeight:700,marginBottom:6,letterSpacing:1.5}}>
                ✦ ANSWER
              </div>
              <div style={{color:'#e2e8f0',fontSize:12,lineHeight:1.7,whiteSpace:'pre-wrap'}}>
                {task.answer.length>600?task.answer.slice(0,600)+'…':task.answer}
              </div>
            </div>}

          {isRun && visRows.length===0 &&
            <div className="pulse" style={{padding:'6px 18px',color:'#4a5580',fontSize:11}}>
              pipeline starting…
            </div>}
        </div>
      )}
    </div>
  );
}

function ExecutionLog({tasks, order}) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) ref.current.scrollTop = 0;
  }, [order.length]);

  if (!order.length)
    return (
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',
                   color:'#2d3558',flexDirection:'column',gap:12}}>
        <div style={{fontSize:30,opacity:0.6}}>◆</div>
        <div style={{fontSize:11,letterSpacing:0.5}}>Waiting for pipeline events…</div>
      </div>
    );

  return (
    <div ref={ref} style={{flex:1,overflow:'auto',padding:'10px 12px'}}>
      {order.map(id => tasks[id] && <TaskCard key={id} task={tasks[id]}/>)}
    </div>
  );
}

// ── Memory graph ───────────────────────────────────────────────────────────

const SPRING=58, REPULSE=130, GRAVITY=0.035, DAMP=0.84;

function MemoryGraph({nodes, edges}) {
  const canvasRef = useRef(null);
  const sim = useRef({nodes:[],edges:[],raf:null,hov:null});

  useEffect(() => {
    const c=canvasRef.current; if(!c)return;
    const W=c.width||300,H=c.height||300;
    const ex=new Map(sim.current.nodes.map(n=>[n.id,n]));
    sim.current.nodes=nodes.map(n=>{
      const e=ex.get(n.id);
      return{...n,x:e?e.x:W/2+(Math.random()-.5)*W*.5,
             y:e?e.y:H/2+(Math.random()-.5)*H*.5,
             vx:e?e.vx:0,vy:e?e.vy:0};
    });
    sim.current.edges=edges;
  },[nodes,edges]);

  useEffect(()=>{
    const c=canvasRef.current; if(!c)return;
    const ctx=c.getContext('2d');
    const s=sim.current;
    function frame(){
      const W=c.width,H=c.height,ns=s.nodes;
      for(let i=0;i<ns.length;i++){
        let fx=0,fy=0;
        for(let j=0;j<ns.length;j++){
          if(i===j)continue;
          const dx=ns[i].x-ns[j].x,dy=ns[i].y-ns[j].y,d2=dx*dx+dy*dy+1;
          fx+=dx*REPULSE/d2;fy+=dy*REPULSE/d2;
        }
        for(const e of s.edges){
          const o=ns[i].id===e.source?ns.find(n=>n.id===e.target):
                  ns[i].id===e.target?ns.find(n=>n.id===e.source):null;
          if(!o)continue;
          const dx=o.x-ns[i].x,dy=o.y-ns[i].y,d=Math.sqrt(dx*dx+dy*dy)||1;
          const f=(d-SPRING)*.035;fx+=dx/d*f;fy+=dy/d*f;
        }
        fx+=(W/2-ns[i].x)*GRAVITY;fy+=(H/2-ns[i].y)*GRAVITY;
        ns[i].vx=(ns[i].vx+fx)*DAMP;ns[i].vy=(ns[i].vy+fy)*DAMP;
        ns[i].x=Math.max(12,Math.min(W-12,ns[i].x+ns[i].vx));
        ns[i].y=Math.max(12,Math.min(H-12,ns[i].y+ns[i].vy));
      }
      ctx.fillStyle='#0a0c14';ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='#1a1d2e';ctx.lineWidth=0.8;
      for(const e of s.edges){
        const a=ns.find(n=>n.id===e.source),b=ns.find(n=>n.id===e.target);
        if(!a||!b)continue;
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
      }
      for(const n of ns){
        const col=NODE_COLOR[n.type]||'#475569';
        const r=Math.min(7,2.5+Math.log1p(n.observations||1)*1.2);
        const ih=s.hov===n.id;
        if(ih){ctx.beginPath();ctx.arc(n.x,n.y,r+6,0,Math.PI*2);ctx.fillStyle=col+'28';ctx.fill();}
        ctx.beginPath();ctx.arc(n.x,n.y,r,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
        if(ih||ns.length<30){
          ctx.fillStyle='#b8c4d8';ctx.font='9px JetBrains Mono';ctx.textAlign='center';
          ctx.fillText(n.label.slice(0,18),n.x,n.y-r-3);
        }
        if(ih&&n.summary){
          const txt=n.summary.slice(0,70);
          const tw=ctx.measureText(txt).width+14;
          const tx=Math.min(W-tw-4,Math.max(4,n.x+r+4));
          const ty=Math.max(22,n.y-10);
          ctx.fillStyle='#0e1120';ctx.fillRect(tx,ty-14,tw,20);
          ctx.fillStyle='#7dd3fc';ctx.textAlign='left';ctx.fillText(txt,tx+7,ty);
        }
      }
      s.raf=requestAnimationFrame(frame);
    }
    if(s.raf)cancelAnimationFrame(s.raf);
    frame();
    return()=>{if(s.raf)cancelAnimationFrame(s.raf);};
  },[]);

  useEffect(()=>{
    const c=canvasRef.current;if(!c)return;
    const resize=()=>{c.width=c.offsetWidth;c.height=c.offsetHeight;};
    resize();
    const ro=new ResizeObserver(resize);ro.observe(c.parentElement);
    return()=>ro.disconnect();
  },[]);

  function onMouse(e){
    const c=canvasRef.current;if(!c)return;
    const r=c.getBoundingClientRect();
    const mx=(e.clientX-r.left)*(c.width/r.width);
    const my=(e.clientY-r.top)*(c.height/r.height);
    let found=null;
    for(const n of sim.current.nodes)
      if(Math.hypot(n.x-mx,n.y-my)<12){found=n.id;break;}
    sim.current.hov=found;
  }

  return <canvas ref={canvasRef} onMouseMove={onMouse}
                 style={{width:'100%',height:'100%',display:'block'}}/>;
}

// ── App ────────────────────────────────────────────────────────────────────

function App() {
  const [state, dispatch] = useReducer(reducer, initState);
  const esRef = useRef(null);

  // SSE — auto-reconnects
  useEffect(()=>{
    let dead=false;
    function connect(){
      if(dead)return;
      const es=new EventSource('/api/stream');
      esRef.current=es;
      es.onopen=()=>dispatch({type:'CONNECT'});
      es.onmessage=ev=>{
        try{
          const d=JSON.parse(ev.data);
          if(d.type==='ping')return;
          if(d.type==='trace')dispatch({type:'TRACE',event:d});
        }catch{}
      };
      es.onerror=()=>{
        dispatch({type:'DISCONNECT'});
        es.close();
        setTimeout(connect,3000);
      };
    }
    connect();
    return()=>{dead=true;esRef.current?.close();};
  },[]);

  // Poll status+graph every 5 s; bootstrap tasks once
  useEffect(()=>{
    async function poll(boot=false){
      try{
        const[s,g]=await Promise.all([
          fetch('/api/status').then(r=>r.json()),
          fetch('/api/graph').then(r=>r.json()),
        ]);
        dispatch({type:'STATUS',payload:s});
        dispatch({type:'GRAPH', payload:g});
      }catch{}
      if(boot){
        try{
          const t=await fetch('/api/tasks').then(r=>r.json());
          if(t.tasks?.length)dispatch({type:'BOOTSTRAP',payload:t.tasks});
        }catch{}
      }
    }
    poll(true);
    const iv=setInterval(poll,5000);
    return()=>clearInterval(iv);
  },[]);

  const {tasks,order,status,graph,connected}=state;

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',background:'#0a0c14'}}>
      <StatusBar status={status} connected={connected}/>

      <div style={{flex:1,display:'flex',overflow:'hidden'}}>

        {/* Execution log */}
        <div style={{flex:1,display:'flex',flexDirection:'column',
                     minWidth:0,borderRight:'1px solid #1a1d2e'}}>
          <div style={{padding:'6px 14px',borderBottom:'1px solid #1a1d2e',
                       color:'#4a5580',fontSize:10,letterSpacing:2,
                       background:'#0c0e1a'}}>
            EXECUTION LOG
          </div>
          <ExecutionLog tasks={tasks} order={order}/>
        </div>

        {/* Memory graph */}
        <div style={{width:340,display:'flex',flexDirection:'column',flexShrink:0}}>
          <div style={{padding:'6px 14px',borderBottom:'1px solid #1a1d2e',
                       display:'flex',alignItems:'center',gap:8,
                       color:'#4a5580',fontSize:10,letterSpacing:2,
                       background:'#0c0e1a'}}>
            <span>MEMORY GRAPH</span>
            <span style={{color:'#1e2642'}}>—</span>
            <span>{graph.nodes.length} nodes</span>
            <div style={{flex:1}}/>
            <button
              onClick={()=>fetch('/api/graph/purge',{method:'POST'})}
              style={{background:'transparent',border:'1px solid #252d4a',color:'#4a5580',
                      fontSize:9,padding:'2px 8px',borderRadius:4,cursor:'pointer',
                      fontFamily:'inherit',letterSpacing:0.5}}
              onMouseOver={e=>e.target.style.color='#ef4444'}
              onMouseOut={e=>e.target.style.color='#4a5580'}
            >PURGE</button>
          </div>
          <div style={{flex:1,minHeight:0}}>
            <MemoryGraph nodes={graph.nodes} edges={graph.edges}/>
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
