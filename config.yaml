# Sisyphean configuration
# Set mock: true to run without llama-server (useful when no GPU is available)

llm:
  model_path: "C:/llama.cpp/models/gemma4-e2b-q8.gguf"
  model_name: sisyphean-qwen3:latest       # name exposed via /v1/models
  local_model: "gemma4:latest"           # non-empty = use Ollama
  server:
    host: 127.0.0.1
    port: 8080                         # llama-server default port
    ollama_port: 11434                 # Ollama default port (used when local_model is set)
    context_size: 8192
    threads: 8                         # Ryzen 7 7735U has 8 cores
    gpu_layers: 0                      # CPU only
    extra_args: []

  # ── Optional: external OpenAI-compatible API ──────────────────────────────
  # Set enabled: true + paste your key to use a cloud model instead of
  # llama-server.  mock: true is ignored when external_api.enabled is true.
  #
  # Free tiers that work out of the box:
  #   OpenRouter  https://openrouter.ai      google/gemma-3-4b-it:free  (no credits)
  #   Groq        https://console.groq.com   gemma2-9b-it
  #   Google AI   https://aistudio.google.com gemini-2.0-flash-lite
  external_api:
    enabled: false
    base_url: "http://192.168.29.37:8081/v1"
    api_key: "local"
    model: "gemma-4-E4B-it-Q8_0.gguf"

embedding:
  enabled: false                       # set true once you have an embedding model
  model_path: models/embed.gguf        # e.g. nomic-embed-text-v1.5.Q4_K_M.gguf
  model_name: sisyphean-embed
  server:
    host: 127.0.0.1
    port: 8081
    context_size: 2048
    threads: 4
    gpu_layers: 0
    extra_args: []

api:
  host: 127.0.0.1
  port: 47291                          # exotic port — avoids conflict with common dev servers
  cors_origins:
    - "http://localhost:5173"          # Vite dev server (React)
    - "http://localhost:3000"
    - "http://localhost:47293"         # BirdClaw web UI

# Set to true to skip llama-server entirely and return mock responses.
# Use this on machines without a model file / GPU for testing the API layer.
memory:
  path: ./memory                     # where graph.json and artifacts.jsonl live
  soul_file: ./soul.md               # personality — edit this to shape behaviour
  injection_budget: 1500             # max tokens injected into every request
  top_n_nodes: 5                     # graph nodes retrieved per query
  top_n_artifacts: 3                 # artifact store results per query
  embedding_model: null              # keyword search only — no HuggingFace download

search:
  searxng_url: "http://localhost:8888"   # local SearXNG instance — set to "" to disable

mock: false

workspace: ./workspace

skills_path: ./skills          # Sisyphean's permanent skill scripts

debug:
  dump_requests: false   # set true to write last_request.json for each fresh request
